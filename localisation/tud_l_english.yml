l_english:
 TND:0 "Turanian National Directorate"
 TND_DEF:0 "Turanian"
 TND_ADJ:0 "Turanian"
 TND_paternal_autocrat:0 "Directorate Loyalists"
 TND_paternal_autocrat_desc:0 "Bureaucrats and intellectuals striving to hold the fractured Turanian union together through administration rather than the sword."
 POLITICS_TND_TOGAN_DESC:0 "Historian and former Bashkir nationalist leader, Zeki Velidi Togan now heads the remnants of the Turanian state apparatus from Samarkand."
 KRF:0 "Kazakh Revolutionary Front"
 KRF_DEF:0 "Kazakh Revolutionary"
 KRF_ADJ:0 "Kazakh Revolutionary"
 KRF_marxist_leninist:0 "Revolutionary Front"
 KRF_marxist_leninist_desc:0 "Moscow-backed communists seeking to bring all of Turan under the banner of the Soviet revolution."
 POLITICS_KRF_RYSKULOV_DESC:0 "A veteran Kazakh Bolshevik and Soviet functionary, Turar Ryskulov leads the Revolutionary Front with steady backing from Moscow."
 KMJ:0 "Kokand Military Junta"
 KMJ_DEF:0 "Kokandi"
 KMJ_ADJ:0 "Kokandi"
 KMJ_ultranationalist:0 "Army of Islam Remnants"
 KMJ_ultranationalist_desc:0 "Enver Pasha's most fanatical officers, who believe the Turanian union must be reforged by the sword."
 POLITICS_KMJ_SAMI_DESC:0 "A former Teskilat-i Mahsusa officer and Enver Pasha's most loyal comrade-in-arms, Haci Sami Kuscubasi commands a veteran army from the southeast."
 KHO:0 "Emirate of Khwarezm"
 KHO_DEF:0 "Khwarezmian"
 KHO_ADJ:0 "Khwarezmian"
 KHO_theocratic_despot:0 "Traditionalist Emirate"
 KHO_theocratic_despot_desc:0 "Tribal chiefs and religious emirs who reject modern industry and want the old khanates restored."
 POLITICS_KHO_JUNAID_DESC:0 "One of the last great Basmachi commanders, Junaid Khan rules the desert oases of Khorezm through the loyalty of his desert cavalry."
 ALR:0 "Alash Republic"
 ALR_DEF:0 "Alashi"
 ALR_ADJ:0 "Alashi"
 ALR_alash_liberalism:0 "Alash Orda"
 ALR_alash_liberalism_desc:0 "Teachers, civil servants, and intellectuals who fled both the militarists and the communists to build a Western-style republic."
 POLITICS_ALR_BUKEIKHANOV_DESC:0 "Founder of the historic Alash Orda government, Alikhan Bukeikhanov leads a fragile republic that survives on foreign goodwill more than force of arms."
 ETR:0 "First East Turkestan Republic"
 ETR_DEF:0 "East Turkestani"
 ETR_ADJ:0 "East Turkestani"
 ETR_islamic_republic:0 "Kashgar Council"
 ETR_islamic_republic_desc:0 "Uyghur and Kyrgyz leaders fighting a two-front struggle for survival, caught between Chinese warlords to the east and the Turanian war to the west."
 POLITICS_ETR_NIYAZ_DESC:0 "Hoja Niyaz leads the easternmost fragment of the old Turanian order, isolated far beyond the Tian Shan mountains."
 TMA:0 "Tashkent Metropolitan Authority"
 TMA_DEF:0 "Tashkenti"
 TMA_ADJ:0 "Tashkenti"
 TMA_despotism:0 "Metropolitan Authority"
 TMA_despotism_desc:0 "The old Turanian parliament and central bank, fortified within a besieged capital city, unable to project power beyond its own walls."
 POLITICS_TMA_SHOKAY_DESC:0 "A moderate figure from the old Alash Orda and Turkestan autonomy movements, Mustafa Shokay governs what remains of the legitimate Turanian state from a surrounded capital."
 TWS:0 "Turanian Workers Syndicate"
 TWS_DEF:0 "Syndicalist"
 TWS_ADJ:0 "Syndicalist"
 TWS_syndicalist:0 "Workers Syndicate"
 TWS_syndicalist_desc:0 "Factory workers and militia who seized Tashkent's arms industry, seeking a local communist utopia independent of Moscow."
 POLITICS_TWS_IKRAMOV_DESC:0 "A committed Uzbek communist organizer, Akmal Ikramov leads the industrial districts in revolt against both the old government and foreign domination alike."
 CCM:0 "Caspian Corporate Mandate"
 CCM_DEF:0 "Caspian"
 CCM_ADJ:0 "Caspian"
 CCM_oligarchic:0 "Corporate Mandate"
 CCM_oligarchic_desc:0 "Oil barons and foreign concessionaires who bought the loyalty of local elites, defended by British advisors and Western mercenaries."
 POLITICS_CCM_SADUAKASOV_DESC:0 "A pragmatic Kazakh intellectual turned businessman, Smagul Saduakasov presides over the wealthiest but most distrusted of the Turanian successor states."
 SCH:0 "Steppe Cavalry Host"
 SCH_DEF:0 "Steppe"
 SCH_ADJ:0 "Steppe"
 SCH_stratocracy:0 "Cavalry Host"
 SCH_stratocracy_desc:0 "A roaming military encampment with no fixed capital, living off constant raids across the open steppe."
 POLITICS_SCH_MOMYSHULY_DESC:0 "A young and ferociously aggressive cavalry commander, Baurzhan Momyshuly leads a war band that knows no home but the saddle."
 KMC:0 "Kyrgyz Mountain Confederation"
 KMC_DEF:0 "Kyrgyz"
 KMC_ADJ:0 "Kyrgyz"
 KMC_tribal_council:0 "Mountain Confederation"
 KMC_tribal_council_desc:0 "Mountain clans holding the high passes of the Tian Shan, living off trade tolls and nearly impossible to conquer."
 POLITICS_KMC_AIDARBEKOV_DESC:0 "Imanaly Aidarbekov leads a loose confederation of mountain clans who answer to no central authority but their own councils."
 TFL:0 "Transcaspian Fedai Legion"
 TFL_DEF:0 "Fedai"
 TFL_ADJ:0 "Fedai"
 TFL_fedai_command:0 "Fedai Command"
 TFL_fedai_command_desc:0 "A shadowy network of irregular fighters and intelligence operatives drawing on the old Teskilat-i Mahsusa tradition, holding the Transcaspian desert through raids and covert influence rather than open battle."
 POLITICS_TFL_ESREF_DESC:0 "A legendary Ottoman irregular commander and intelligence operative, Esref Kuscubasi leads a covert network across the Transcaspian desert, continuing the work he once carried out for Enver Pasha's Special Organization."
