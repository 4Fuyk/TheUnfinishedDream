l_english:
 TND:0 "Turanian National Directorate"
 TND_DEF:0 "Turanian"
 TND_ADJ:0 "Turanian"
 TND_neutrality:0 "Directorate Loyalists"
 TND_neutrality_desc:0 "Bureaucrats and intellectuals striving to hold the fractured Turanian union together through administration rather than the sword."
 POLITICS_TND_TOGAN_DESC:0 "Historian and former Bashkir nationalist leader, Zeki Velidi Togan now heads the remnants of the Turanian state apparatus from Samarkand."
 KRF:0 "Kazakh Revolutionary Front"
 KRF_DEF:0 "Kazakh Revolutionary"
 KRF_ADJ:0 "Kazakh Revolutionary"
 KRF_communism:0 "Revolutionary Front"
 KRF_communism_desc:0 "Moscow-backed communists seeking to bring all of Turan under the banner of the Soviet revolution."
 POLITICS_KRF_RYSKULOV_DESC:0 "A veteran Kazakh Bolshevik and Soviet functionary, Turar Ryskulov leads the Revolutionary Front with steady backing from Moscow."
 KMJ:0 "Kokand Military Junta"
 KMJ_DEF:0 "Kokandi"
 KMJ_ADJ:0 "Kokandi"
 KMJ_fascism:0 "Army of Islam Remnants"
 KMJ_fascism_desc:0 "Enver Pasha's most fanatical officers, who believe the Turanian union must be reforged by the sword."
 POLITICS_KMJ_SAMI_DESC:0 "A former Teskilat-i Mahsusa officer and Enver Pasha's most loyal comrade-in-arms, Haji Sami Bey commands the Fergana Valley's veteran army."
 KHO:0 "Emirate of Khwarezm"
 KHO_DEF:0 "Khwarezmian"
 KHO_ADJ:0 "Khwarezmian"
 KHO_neutrality:0 "Traditionalist Emirate"
 KHO_neutrality_desc:0 "Tribal chiefs and religious emirs who reject modern industry and want the old khanates restored."
 POLITICS_KHO_JUNAID_DESC:0 "One of the last great Basmachi commanders, Junaid Khan rules the desert oases of Khorezm through the loyalty of his desert cavalry."
 ALR:0 "Alash Republic"
 ALR_DEF:0 "Alashi"
 ALR_ADJ:0 "Alashi"
 ALR_democratic:0 "Alash Orda"
 ALR_democratic_desc:0 "Teachers, civil servants, and intellectuals who fled both the militarists and the communists to build a Western-style republic."
 POLITICS_ALR_BUKEIKHANOV_DESC:0 "Founder of the historic Alash Orda government, Alikhan Bukeikhanov leads a fragile republic that survives on foreign goodwill more than force of arms."
 ETR:0 "First East Turkestan Republic"
 ETR_DEF:0 "East Turkestani"
 ETR_ADJ:0 "East Turkestani"
 ETR_neutrality:0 "Kashgar Council"
 ETR_neutrality_desc:0 "Uyghur and Kyrgyz leaders fighting a two-front struggle for survival, caught between Chinese warlords to the east and the Turanian war to the west."
 POLITICS_ETR_NIYAZ_DESC:0 "Hoja Niyaz leads the easternmost fragment of the old Turanian order, isolated far beyond the Tian Shan mountains."
